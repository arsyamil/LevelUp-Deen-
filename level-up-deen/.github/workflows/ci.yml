name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Stub values so `next build` can compile server components that reference
  # Clerk / Supabase env vars without failing.  They are never used at runtime.
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
  CLERK_SECRET_KEY: sk_test_stub
  NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.stub
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.stub
  AUTH_BYPASS_ENABLED: "false"
  NEXT_PUBLIC_APP_ENV: ci

jobs:
  check:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify workflow invariants
        run: npm run verify:workflow

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
