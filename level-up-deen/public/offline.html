<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0d12" />
    <meta name="description" content="Level Up Deen - Offline" />
    <title>Level Up Deen - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Oxygen", "Ubuntu", "Cantarell", sans-serif;
        background: linear-gradient(135deg, #0a0d12 0%, #141c29 100%);
        color: #e8eef5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        text-align: center;
        max-width: 500px;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        opacity: 0.8;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 15px;
        color: #dca95b;
      }

      p {
        font-size: 16px;
        line-height: 1.6;
        color: #a8b5c7;
        margin-bottom: 20px;
      }

      .button {
        display: inline-block;
        padding: 12px 30px;
        background: #47c48b;
        color: #0a0d12;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: background 0.3s ease;
        border: none;
        cursor: pointer;
        font-size: 16px;
      }

      .button:hover {
        background: #37b47b;
      }

      .status {
        margin-top: 30px;
        padding: 15px;
        background: rgba(71, 196, 139, 0.1);
        border-left: 4px solid #47c48b;
        border-radius: 4px;
        text-align: left;
      }

      .status p {
        margin: 5px 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg
        class="icon"
        viewBox="0 0 192 192"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect width="192" height="192" rx="36" fill="#0A0D12" />
        <circle cx="96" cy="96" r="70" fill="#141C29" />
        <path d="M53 111L96 47L139 111H53Z" fill="#DCA95B" />
        <circle cx="96" cy="112" r="16" fill="#47C48B" />
      </svg>

      <h1>Kamu Sedang Offline</h1>
      <p>
        Koneksi internet tidak tersedia. Beberapa fitur mungkin tidak dapat
        diakses saat ini.
      </p>

      <button class="button" onclick="location.reload()">Coba Lagi</button>

      <div class="status">
        <p>
          <strong>Tips:</strong> Aplikasi ini mendukung mode offline. Konten
          yang telah dimuat sebelumnya masih dapat diakses.
        </p>
      </div>
    </div>
  </body>
</html>
