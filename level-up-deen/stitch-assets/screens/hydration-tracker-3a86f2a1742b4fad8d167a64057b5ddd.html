<script>
        let currentWater = 1250;
        const goal = 2500;

        function addWater(amount) {
            currentWater = Math.min(currentWater + amount, goal);
            updateUI();
            
            // Interaction feedback
            const btn = event.currentTarget;
            btn.classList.add('bg-primary-container', 'text-white');
            setTimeout(() => {
                btn.classList.remove('bg-primary-container', 'text-white');
            }, 300);
        }

        function updateUI() {
            const percentage = (currentWater / goal) * 100;
            const fillEl = document.getElementById('water-fill');
            const textEl = document.getElementById('current-ml');
            
            fillEl.style.height = `${percentage}%`;
            
            // Animate number count
            let start = parseInt(textEl.innerText);
            let duration = 600;
            let startTime = null;

            function animate(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = currentTime - startTime;
                let val = Math.min(Math.floor(start + (currentWater - start) * (progress / duration)), currentWater);
                textEl.innerText = val;
                if (progress < duration) {
                    requestAnimationFrame(animate);
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
